metadata:
  name: selva-workers
  project: autoswarm-office
  description: AutoSwarm Office — Background task workers
spec:
  build:
    type: dockerfile
    dockerfile: infra/docker/Dockerfile.workers
    context: .
    source:
      git:
        repository: https://github.com/madfam-org/autoswarm-office
        branch: main
        autoDeploy: true
  runtime:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: autoswarm-secrets
          key: database-url
    - name: REDIS_URL
      valueFrom:
        secretKeyRef:
          name: autoswarm-secrets
          key: redis-url
