# Enclii deployment config — replace your-domain.example.com and your-org with your values
apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: autoswarm-nexus-api
  project: your-project
  description: AutoSwarm Office — Core orchestration API
spec:
  build:
    type: dockerfile
    dockerfile: infra/docker/Dockerfile.nexus-api
    context: .
    source:
      git:
        repository: https://github.com/your-org/autoswarm-office
        branch: main
        autoDeploy: true
  runtime:
    port: 4300
    replicas: 1
    resources:
      requests:
        cpu: "50m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    healthCheck: /api/v1/health
    readinessProbe:
      path: /api/v1/health
      initialDelaySeconds: 10
      periodSeconds: 5
    livenessProbe:
      path: /api/v1/health
      initialDelaySeconds: 30
      periodSeconds: 10
  env:
    - name: PORT
      value: "4300"
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: autoswarm-secrets
          key: database-url
    - name: REDIS_URL
      valueFrom:
        secretKeyRef:
          name: autoswarm-secrets
          key: redis-url
    - name: JANUA_ISSUER_URL
      value: https://auth.your-domain.example.com
    - name: JANUA_CLIENT_ID
      value: autoswarm-office
    - name: JANUA_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: autoswarm-secrets
          key: janua-client-secret
  domains:
    - domain: api.your-domain.example.com
      tls: true
      tlsIssuer: cloudflare
      primary: true
  slo:
    availability: 99.9
    latencyP99Ms: 500
---
apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: autoswarm-office-ui
  project: your-project
  description: AutoSwarm Office — Spatial office UI
spec:
  build:
    type: dockerfile
    dockerfile: infra/docker/Dockerfile.office-ui
    context: .
    args:
      NEXT_PUBLIC_API_URL: https://api.your-domain.example.com
      NEXT_PUBLIC_JANUA_URL: https://auth.your-domain.example.com
      NEXT_PUBLIC_COLYSEUS_URL: wss://ws.your-domain.example.com
    source:
      git:
        repository: https://github.com/your-org/autoswarm-office
        branch: main
        autoDeploy: true
  runtime:
    port: 3000
    replicas: 1
    resources:
      requests:
        cpu: "25m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    healthCheck: /api/health
    readinessProbe:
      path: /api/health
      initialDelaySeconds: 10
      periodSeconds: 5
    livenessProbe:
      path: /api/health
      initialDelaySeconds: 30
      periodSeconds: 10
  env:
    - name: NEXT_PUBLIC_DHANAM_URL
      value: https://billing.your-domain.example.com
  domains:
    - domain: office.your-domain.example.com
      tls: true
      tlsIssuer: cloudflare
      primary: true
---
