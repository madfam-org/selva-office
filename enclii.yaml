    dockerfile: infra/docker/Dockerfile.colyseus
    context: .
    source:
      git:
        repository: https://github.com/madfam-org/autoswarm-office
        branch: main
        autoDeploy: true
  runtime:
    port: 4303
    replicas: 1
    resources:
      requests:
        cpu: "50m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    healthCheck: /health
    readinessProbe:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 5
    livenessProbe:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 10
  domains:
    - domain: ws.selva.town
      tls: true
      tlsIssuer: cloudflare
