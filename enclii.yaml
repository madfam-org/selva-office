# PP.4 — project-level promotion policy (RFC 0001 Pattern B).
#
# autoswarm-office is Pattern B (manual gate) because workers run
# agent code that touches prod customer data via email sends, git
# pushes, database writes, and Stripe/Resend/GitHub API calls. A bad
# promote here would email real customers or push real git branches.
# Human confirmation is the right trade-off.
#
# Interpreted by Enclii 0.8+ promotion hook; workflows also read
# these values via `vars.MIN_SOAK_MINUTES` / `vars.AUTO_PROMOTE_ENABLED`.
apiVersion: enclii.dev/v1
kind: Project
metadata:
  name: autoswarm-office
spec:
  promotion:
    pattern: manual
    min_soak_minutes: 30
    require_smoke_pass: true
---
apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: autoswarm-nexus-api
  project: autoswarm-office
  description: AutoSwarm Office — Core orchestration API
spec:
  build:
    type: dockerfile
    dockerfile: infra/docker/Dockerfile.nexus-api
    context: .
    source:
      git:
        repository: https://github.com/madfam-org/autoswarm-office
        branch: main
        autoDeploy: true
  runtime:
    port: 4300
    replicas: 1
    resources:
      requests:
        cpu: "50m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    healthCheck: /api/v1/health
    readinessProbe:
      path: /api/v1/health
      initialDelaySeconds: 10
      periodSeconds: 5
    livenessProbe:
      path: /api/v1/health
      initialDelaySeconds: 30
      periodSeconds: 10
  env:
    - name: PORT
      value: "4300"
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: autoswarm-secrets
          key: database-url
    - name: REDIS_URL
      valueFrom:
        secretKeyRef:
          name: autoswarm-secrets
          key: redis-url
    - name: JANUA_ISSUER_URL
      value: https://auth.selva.town
    - name: JANUA_CLIENT_ID
      value: autoswarm-office
    - name: JANUA_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: autoswarm-secrets
          key: janua-client-secret
  domains:
    - domain: api.selva.town
      tls: true
      tlsIssuer: cloudflare
      primary: true
  slo:
    availability: 99.9
    latencyP99Ms: 500
  network:
    services:
      - name: nexus-api
        port: 4300
        ingress: [cloudflare-tunnel]
        egress: [dns, https, postgres, redis]
      - name: office-ui
        port: 3000
        ingress: [cloudflare-tunnel]
        egress: [dns, https]
      - name: admin
        port: 3000
        ingress: [cloudflare-tunnel]
        egress: [dns, https]
      - name: colyseus
        port: 4303
        ingress: [cloudflare-tunnel]
        egress: [dns, https, redis]
      - name: gateway
        port: 4304
        ingress: [cloudflare-tunnel]
        egress: [dns, https]
      - name: workers
        port: 0
        egress: [dns, https, postgres, redis]
    custom:
      - name: office-ui-to-nexus
        from: { app: office-ui }
        to: { app: nexus-api }
        port: 4300
        direction: both
      - name: admin-to-nexus
        from: { app: admin }
        to: { app: nexus-api }
        port: 4300
        direction: both
      - name: colyseus-to-nexus
        from: { app: colyseus }
        to: { app: nexus-api }
        port: 4300
        direction: both
      - name: gateway-to-nexus
        from: { app: gateway }
        to: { app: nexus-api }
        port: 4300
        direction: both
      - name: gateway-to-colyseus
        from: { app: gateway }
        to: { app: colyseus }
        port: 4303
        direction: both
---
apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: autoswarm-office-ui
  project: autoswarm-office
  description: AutoSwarm Office — Spatial office UI
spec:
  build:
    type: dockerfile
    dockerfile: infra/docker/Dockerfile.office-ui
    context: .
    args:
      NEXT_PUBLIC_API_URL: https://api.selva.town
      NEXT_PUBLIC_JANUA_URL: https://auth.selva.town
      NEXT_PUBLIC_COLYSEUS_URL: wss://ws.selva.town
    source:
      git:
        repository: https://github.com/madfam-org/autoswarm-office
        branch: main
        autoDeploy: true
  runtime:
    port: 3000
    replicas: 1
    resources:
      requests:
        cpu: "25m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    healthCheck: /api/health
    readinessProbe:
      path: /api/health
      initialDelaySeconds: 10
      periodSeconds: 5
    livenessProbe:
      path: /api/health
      initialDelaySeconds: 30
      periodSeconds: 10
  env:
    - name: NEXT_PUBLIC_DHANAM_URL
      value: https://app.dhan.am
  domains:
    - domain: selva.town
      tls: true
      tlsIssuer: cloudflare
      primary: true
    - domain: www.selva.town
      tls: true
      redirect: selva.town
---
apiVersion: enclii.dev/v1
kind: Service
