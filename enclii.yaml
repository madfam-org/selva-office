---
apiVersion: enclii.dev/v1
kind: Service
metadata:
  name: autoswarm-admin
  project: autoswarm-office
  description: AutoSwarm Office — Admin dashboard
spec:
  build:
    type: dockerfile
    dockerfile: infra/docker/Dockerfile.admin
    context: .
    args:
      NEXT_PUBLIC_API_URL: https://api.selva.town
      NEXT_PUBLIC_JANUA_URL: https://auth.selva.town
    source:
      git:
        repository: https://github.com/madfam-org/autoswarm-office
        branch: main
        autoDeploy: true
  runtime:
    port: 3000
    replicas: 1
    resources:
      requests:
        cpu: "25m"
        memory: "384Mi"
      limits:
        cpu: "500m"
        memory: "768Mi"
    healthCheck: /api/health
    startupProbe:
      path: /api/health
      failureThreshold: 12
      periodSeconds: 5
    readinessProbe:
      path: /api/health
      initialDelaySeconds: 5
      periodSeconds: 15
    livenessProbe:
      path: /api/health
      initialDelaySeconds: 10
      periodSeconds: 30
  domains:
    - domain: admin.selva.town
      tls: true
      tlsIssuer: cloudflare
      primary: true
---
