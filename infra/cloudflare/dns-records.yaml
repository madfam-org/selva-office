# Replace your-domain.example.com and your-tunnel with your values
records:
  - type: CNAME
    name: api.your-domain.example.com
    content: your-tunnel.cfargotunnel.com
    proxied: true
  - type: CNAME
    name: office.your-domain.example.com
    content: your-tunnel.cfargotunnel.com
    proxied: true
  - type: CNAME
    name: ws.your-domain.example.com
    content: your-tunnel.cfargotunnel.com
    proxied: true
  - type: CNAME
    name: admin.your-domain.example.com
    content: your-tunnel.cfargotunnel.com
    proxied: true
