---
# Secret: autoswarm-hermes-secrets
# Holds all credentials introduced by the Hermes Agent parity integration.
#
# ⚠️  DO NOT commit real values. Populate via:
#   - Sealed Secrets (recommended):  kubeseal --fetch-cert | kubeseal ...
#   - External Secrets Operator:     ExternalSecret CR pointing to Vault / AWS SM
#   - Manual:  kubectl create secret generic autoswarm-hermes-secrets --from-literal=...
#
# All values below are base64-encoded placeholders (echo -n "REPLACE_ME" | base64)
apiVersion: v1
kind: Secret
metadata:
  name: autoswarm-hermes-secrets
  namespace: autoswarm
  labels:
    app.kubernetes.io/part-of: autoswarm-office
    app.kubernetes.io/component: hermes-integration
type: Opaque
data:
  # ── Multi-channel gateway: Telegram ─────────────────────────────────────────
  TELEGRAM_BOT_TOKEN: UkVQTEFDRV9NRQ==         # REPLACE_ME — from @BotFather
  TELEGRAM_WEBHOOK_SECRET: UkVQTEFDRV9NRQ==    # REPLACE_ME — openssl rand -hex 32

  # ── Multi-channel gateway: Discord ──────────────────────────────────────────
  DISCORD_WEBHOOK_SECRET: UkVQTEFDRV9NRQ==     # REPLACE_ME

  # ── Multi-channel gateway: Slack (Gap 4) ────────────────────────────────────
  SLACK_SIGNING_SECRET: UkVQTEFDRV9NRQ==       # REPLACE_ME — from Slack App Basic Info

  # ── Multi-channel gateway: Email inbound (Gap 4) ────────────────────────────
  # GATEWAY_EMAIL_WHITELIST is a comma-separated list — stored as a ConfigMap
  # env var, not a Secret. No entry needed here unless you prefer to encrypt it.

  # ── Multi-channel gateway: SMS/Twilio (Gap 4) ───────────────────────────────
  TWILIO_AUTH_TOKEN: UkVQTEFDRV9NRQ==          # REPLACE_ME — from console.twilio.com
  TWILIO_ACCOUNT_SID: UkVQTEFDRV9NRQ==         # REPLACE_ME — from console.twilio.com

  # ── MCP tool servers ────────────────────────────────────────────────────────
  TAVILY_API_KEY: UkVQTEFDRV9NRQ==             # https://app.tavily.com/sign-up
  GITHUB_TOKEN: UkVQTEFDRV9NRQ==               # Fine-grained PAT, read-only repos scope

