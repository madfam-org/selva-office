# PP.4 — pin HPAs to a single replica in staging.
#
# The prod base declares 3 HPAs (nexus-api 1-6, office-ui 1-4,
# colyseus 1-3). Staging does not need autoscaling — a single
# replica gives faster feedback on deploy problems (no "HPA is
# masking the issue" debugging) and keeps staging cheap.
#
# This is a JSON Patch applied to every HorizontalPodAutoscaler in
# the overlay (targeted via the `patches:` block in
# kustomization.yaml). Same pattern as Karafiel PP.1 +
# Dhanam PP.2b.
- op: replace
  path: /spec/minReplicas
  value: 1
- op: replace
  path: /spec/maxReplicas
  value: 1
