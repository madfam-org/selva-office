# PP.4 — staging patch for gateway (heartbeat daemon).
#
# CRITICAL staging guardrail: AUTO_DISPATCH_ENABLED=false. The gateway
# heartbeat loop is what scrapes PhyneCRM and auto-dispatches
# SwarmTasks — turning this on in staging would send real customer
# emails via Resend. HITL is a secondary safety net; this flag is the
# primary cutoff.
#
# Same envFrom-replaces-list rule as admin: restate the ConfigMap ref
# + the Secret ref with -staging name.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  template:
    spec:
      containers:
        - name: gateway
          envFrom:
            - configMapRef:
                name: autoswarm-config
            - secretRef:
                name: autoswarm-staging-secrets
          env:
            - name: ENVIRONMENT
              value: staging
            - name: SENTRY_ENVIRONMENT
              value: staging
            - name: AUTO_DISPATCH_ENABLED
              value: "false"
            - name: NEXUS_API_URL
              value: "http://nexus-api.autoswarm-staging.svc.cluster.local"
            - name: PHYNE_CRM_URL
              value: "http://phyne-crm-web.phyne-crm.svc.cluster.local"
            - name: PHYNE_CRM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: autoswarm-staging-secrets
                  key: PHYNE_CRM_TOKEN
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autoswarm-staging-secrets
                  key: RESEND_API_KEY
            - name: WORKER_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: autoswarm-staging-secrets
                  key: WORKER_API_TOKEN
