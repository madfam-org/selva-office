# PP.4 — commented template showing the operator exactly which
# Secrets must be provisioned in the `autoswarm-staging` namespace
# before the first staging deploy.
#
# This file is NOT applied by kustomize (no Kustomization resource
# block references it). It is documentation-as-YAML. The actual
# Secrets are created out-of-band via `kubectl create secret` so
# their payloads never land in git.
#
# Bootstrap command (run ONCE per cluster):
#
#   kubectl create namespace autoswarm-staging
#
#   kubectl create secret generic autoswarm-staging-secrets \
#     -n autoswarm-staging \
#     --from-literal=database-url='postgres://autoswarm:<pw>@postgres-staging:5432/autoswarm_staging' \
#     --from-literal=redis-url='redis://redis-staging:6379/0' \
#     --from-literal=secret-key="$(openssl rand -base64 48)" \
#     --from-literal=RESEND_API_KEY='<staging-resend-key>' \
#     --from-literal=WORKER_API_TOKEN="$(openssl rand -base64 48)" \
#     --from-literal=colyseus-secret="$(openssl rand -base64 32)" \
#     --from-literal=PHYNE_CRM_TOKEN='<staging-phyne-token>' \
#     --from-literal=ENCLII_API_TOKEN='<staging-enclii-token>'
#
#   kubectl create secret generic autoswarm-staging-llm-secrets \
#     -n autoswarm-staging \
#     --from-literal=ANTHROPIC_API_KEY='<staging-anthropic-key>' \
#     --from-literal=DEEPINFRA_API_KEY='<staging-deepinfra-key>' \
#     --from-literal=RESEND_API_KEY='<staging-resend-key>' \
#     --from-literal=WORKER_API_TOKEN="$(openssl rand -base64 48)"
#
#   kubectl create secret generic autoswarm-staging-admin-auth \
#     -n autoswarm-staging \
#     --from-literal=NEXT_PUBLIC_JANUA_PUBLISHABLE_KEY='<staging-janua-client-id>' \
#     --from-literal=NEXT_PUBLIC_JANUA_ISSUER_URL='https://auth.selva.town' \
#     --from-literal=JANUA_SECRET_KEY='<staging-janua-client-secret>'
---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: autoswarm-staging-secrets
#   namespace: autoswarm-staging
# type: Opaque
# stringData:
#   database-url: "postgres://autoswarm:REPLACE@postgres-staging:5432/autoswarm_staging"
#   redis-url: "redis://redis-staging:6379/0"
#   secret-key: "REPLACE_WITH_OPENSSL_RAND"
#   RESEND_API_KEY: "REPLACE"
#   WORKER_API_TOKEN: "REPLACE_WITH_OPENSSL_RAND"
#   colyseus-secret: "REPLACE_WITH_OPENSSL_RAND"
#   PHYNE_CRM_TOKEN: "REPLACE"
#   ENCLII_API_TOKEN: "REPLACE"
---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: autoswarm-staging-llm-secrets
#   namespace: autoswarm-staging
# type: Opaque
# stringData:
#   ANTHROPIC_API_KEY: "REPLACE"
#   DEEPINFRA_API_KEY: "REPLACE"
#   RESEND_API_KEY: "REPLACE"
#   WORKER_API_TOKEN: "REPLACE_WITH_OPENSSL_RAND"
---
# apiVersion: v1
# kind: Secret
# metadata:
#   name: autoswarm-staging-admin-auth
#   namespace: autoswarm-staging
# type: Opaque
# stringData:
#   NEXT_PUBLIC_JANUA_PUBLISHABLE_KEY: "REPLACE"
#   NEXT_PUBLIC_JANUA_ISSUER_URL: "https://auth.selva.town"
#   JANUA_SECRET_KEY: "REPLACE"
