apiVersion: v1
kind: Pod
metadata:
  name: acp-dirty-analyst
  labels:
    app: selva
    component: acp-dirty-env
spec:
  containers:
  - name: analyst-agent
    image: my-registry/selva-analyst:latest
    env:
    - name: ACP_PHASE
      value: "I"
  restartPolicy: Never
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: acp-dirty-network
spec:
  podSelector:
    matchLabels:
      component: acp-dirty-env
  policyTypes:
  - Egress
  - Ingress
  egress:
  - {} # Allows all outbound internet access for SaaS/API observation
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: nexus-api # Only Nexus API can send instructions into dirty env
