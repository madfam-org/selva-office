apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: autoswarm

resources:
  - configmap.yaml
  - org-config.yaml
  - service-account.yaml
  - nexus-api.yaml
  - office-ui.yaml
  - colyseus.yaml
  - admin.yaml
  - admin-external-secret.yaml
  - gateway.yaml
  - workers.yaml
  - service-monitors.yaml
  - pdb.yaml
  - hpa.yaml
  - backup-cronjob.yaml
  - keda-scaledobject.yaml
  - keda-trigger-auth.yaml
  # RFC 0005 Sprint 1a — dedicated SA in the `autoswarm` namespace.
  # The per-target-namespace Roles + RoleBindings live in
  # selva-secret-writer-rolebinding.yaml and are applied OUTSIDE this
  # kustomize bundle (kustomize's namespace: autoswarm would rewrite
  # them incorrectly). See that file's header for the ops procedure.
  - selva-secret-writer-sa.yaml

commonLabels:
  app.kubernetes.io/part-of: autoswarm-office
  app.kubernetes.io/managed-by: kustomize
