# RFC 0005 Sprint 1a — per-namespace bindings for the selva-secret-writer
# ServiceAccount + Role.
#
# Every allowed namespace gets:
#   1. A copy of the Role (same spec, different namespace).
#   2. A RoleBinding granting the SA (in `autoswarm`) the Role's verbs
#      in that namespace.
#
# ADDING A NEW NAMESPACE requires:
#   1. Add the Role + RoleBinding pair below.
#   2. Add the namespace to ALLOWED_NAMESPACES in
#      packages/tools/src/selva_tools/builtins/k8s_secret.py.
#   3. Open a PR. The ArgoCD reconciliation picks up the manifest after
#      merge; the tool constant change propagates on the next worker
#      image build.
#
# Explicitly NOT included: kube-system, default, argocd, monitoring,
# ingress-nginx, cert-manager, vault, external-secrets. If a future
# need arises to write secrets into those namespaces, it should go
# through a separate RFC and a separate SA.
---
# ----------------------------------------------------------------------
# karafiel (prod)
# ----------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: selva-secret-writer
  namespace: karafiel
  labels:
    app.kubernetes.io/part-of: autoswarm-office
    rfc: "0005"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: selva-secret-writer
  namespace: karafiel
  labels:
    app.kubernetes.io/part-of: autoswarm-office
    rfc: "0005"
subjects:
  - kind: ServiceAccount
    name: selva-secret-writer
    namespace: autoswarm
roleRef:
  kind: Role
  name: selva-secret-writer
  apiGroup: rbac.authorization.k8s.io
---
# ----------------------------------------------------------------------
# karafiel-staging
# ----------------------------------------------------------------------
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: selva-secret-writer
  namespace: karafiel-staging
  labels:
    app.kubernetes.io/part-of: autoswarm-office
    rfc: "0005"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: selva-secret-writer
  namespace: karafiel-staging
  labels:
    app.kubernetes.io/part-of: autoswarm-office
    rfc: "0005"
subjects:
  - kind: ServiceAccount
    name: selva-secret-writer
    namespace: autoswarm
roleRef:
  kind: Role
  name: selva-secret-writer
  apiGroup: rbac.authorization.k8s.io
