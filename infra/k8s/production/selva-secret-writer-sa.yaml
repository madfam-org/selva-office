# RFC 0005 Sprint 1a — dedicated ServiceAccount for the Selva worker's
# Secret-writer tool. Kept separate from the main `autoswarm-sa` so the
# RBAC surface for secret writes can be audited independently of the
# worker's normal permissions.
#
# The projected token from this SA is mounted at
#   /var/run/secrets/selva/secret-writer/token
# on the worker pod (see workers.yaml `volumes:` block).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: selva-secret-writer
  namespace: autoswarm
  labels:
    app.kubernetes.io/part-of: autoswarm-office
    app.kubernetes.io/component: secret-writer
    rfc: "0005"
  annotations:
    madfam.io/purpose: >
      Narrowly-scoped SA used by the Selva write_kubernetes_secret tool.
      RoleBindings in each target namespace grant only create/update/patch
      on Secret objects — never get, never delete. See
      internal-devops/rfcs/0005-selva-secret-management.md.
automountServiceAccountToken: false
