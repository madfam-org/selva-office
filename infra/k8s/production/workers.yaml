apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: workers
    app.kubernetes.io/part-of: autoswarm-office
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: workers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workers
        app.kubernetes.io/part-of: autoswarm-office
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: autoswarm-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: workers
          image: ghcr.io/madfam-org/autoswarm-workers:latest
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["true"]
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["true"]
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: autoswarm-config
          env:
            - name: ENVIRONMENT
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: autoswarm-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: autoswarm-secrets
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: autoswarm-secrets
                  key: secret-key
            - name: PHYNE_CRM_URL
              value: http://phyne-crm-web.phyne-crm.svc.cluster.local
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autoswarm-llm-secrets
                  key: RESEND_API_KEY
                  optional: true
            - name: COLYSEUS_SECRET
              valueFrom:
                secretKeyRef:
                  name: autoswarm-secrets
                  key: colyseus-secret
            - name: WORKER_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: autoswarm-llm-secrets
                  key: WORKER_API_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autoswarm-llm-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: DEEPINFRA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autoswarm-llm-secrets
                  key: DEEPINFRA_API_KEY
                  optional: true
            - name: MEMORY_PERSIST_DIR
              value: /data/autoswarm/memory
            - name: BANDIT_PERSIST_PATH
              value: /data/autoswarm/bandit.json
            - name: DHANAM_API_URL
              value: "https://api.dhan.am"
            - name: ENCLII_API_URL
              value: "https://api.enclii.dev"
            - name: ENCLII_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: autoswarm-secrets
                  key: ENCLII_API_TOKEN
                  optional: true
            - name: YANTRA4D_API_URL
              value: "https://api.yantra4d.com"
            - name: COTIZA_API_URL
              value: "https://api.cotiza.studio"
            - name: PRAVARA_MES_API_URL
              value: "https://mes-api.madfam.io"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: autoswarm-memory
              mountPath: /data/autoswarm
      volumes:
        - name: tmp
          emptyDir: {}
        - name: autoswarm-memory
          persistentVolumeClaim:
            claimName: autoswarm-memory-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: autoswarm-memory-pvc
  namespace: autoswarm
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 5Gi
