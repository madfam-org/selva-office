apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: selva-nexus-api
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: autoswarm
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nexus-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
---
