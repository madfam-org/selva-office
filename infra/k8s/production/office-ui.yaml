apiVersion: apps/v1
kind: Deployment
metadata:
  name: office-ui
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: office-ui
    app.kubernetes.io/part-of: autoswarm-office
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: office-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: office-ui
        app.kubernetes.io/part-of: autoswarm-office
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: autoswarm-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: office-ui
          image: ghcr.io/your-org/autoswarm-office-ui:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: NEXT_PUBLIC_API_URL
              value: https://api.your-domain.example.com
            - name: NEXT_PUBLIC_COLYSEUS_URL
              value: wss://ws.your-domain.example.com
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: office-ui
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: office-ui
    app.kubernetes.io/part-of: autoswarm-office
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: office-ui
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
