apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: autoswarm-office
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: autoswarm-office
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: autoswarm-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ghcr.io/madfam-org/autoswarm-gateway:latest
          ports:
            - containerPort: 4304
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4304
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4304
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: autoswarm-config
            - secretRef:
                name: autoswarm-secrets
          env:
            - name: ENVIRONMENT
              value: production
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: autoswarm-office
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - port: 80
      targetPort: 4304
      protocol: TCP
