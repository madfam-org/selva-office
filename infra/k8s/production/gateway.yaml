apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: autoswarm-office
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: autoswarm-office
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: autoswarm-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ghcr.io/madfam-org/autoswarm-gateway:latest
          ports:
            - containerPort: 4304
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["true"]
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["true"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: autoswarm-config
            - secretRef:
                name: autoswarm-secrets
          env:
            - name: ENVIRONMENT
              value: production
            - name: AUTO_DISPATCH_ENABLED
              value: "true"
            - name: NEXUS_API_URL
              value: "http://nexus-api.autoswarm.svc.cluster.local"
            - name: PHYNE_CRM_URL
              value: "http://phyne-crm-web.phyne-crm.svc.cluster.local"
            - name: PHYNE_CRM_TOKEN
              valueFrom:
                secretKeyRef:
                  name: autoswarm-secrets
                  key: PHYNE_CRM_TOKEN
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: autoswarm-secrets
                  key: RESEND_API_KEY
            - name: WORKER_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: autoswarm-secrets
                  key: WORKER_API_TOKEN
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /app/data
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: autoswarm-office
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gateway
  ports:
    - port: 80
      targetPort: 4304
      protocol: TCP
