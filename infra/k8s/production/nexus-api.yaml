apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-api
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: nexus-api
    app.kubernetes.io/part-of: selva
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexus-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexus-api
        app.kubernetes.io/part-of: selva
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: selva-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nexus-api
          image: ghcr.io/madfam-org/selva-nexus-api:latest
          ports:
            - containerPort: 4300
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health/health
              port: 4300
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health/health
              port: 4300
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: selva-config
          env:
            - name: ENVIRONMENT
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: selva-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: selva-secrets
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: selva-secrets
                  key: secret-key
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: selva-secrets
                  key: RESEND_API_KEY
            - name: WORKER_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: selva-secrets
                  key: WORKER_API_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: selva-llm-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: DEEPINFRA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: selva-llm-secrets
                  key: DEEPINFRA_API_KEY
                  optional: true
            - name: ORG_CONFIG_PATH
              value: "/etc/selva/org-config.yaml"
          workingDir: /data
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /data
            - name: org-config
              mountPath: /etc/autoswarm
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: data
          emptyDir: {}
        - name: org-config
          configMap:
            name: selva-org-config
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-api
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: nexus-api
    app.kubernetes.io/part-of: selva
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nexus-api
  ports:
    - port: 80
      targetPort: 4300
      protocol: TCP
