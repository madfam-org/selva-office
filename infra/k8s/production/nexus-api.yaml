apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-api
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: nexus-api
    app.kubernetes.io/part-of: autoswarm-office
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nexus-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexus-api
        app.kubernetes.io/part-of: autoswarm-office
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: autoswarm-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nexus-api
          image: ghcr.io/madfam-org/autoswarm-nexus-api:latest
          ports:
            - containerPort: 4300
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/v1/health/health
              port: 4300
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health/health
              port: 4300
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: autoswarm-config
          env:
            - name: ENVIRONMENT
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: autoswarm-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: autoswarm-secrets
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: autoswarm-secrets
                  key: secret-key
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-api
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: nexus-api
    app.kubernetes.io/part-of: autoswarm-office
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nexus-api
  ports:
    - port: 80
      targetPort: 4300
      protocol: TCP
