# RFC 0005 Sprint 1a — namespace-scoped Role (NOT ClusterRole) granting
# the selva-secret-writer SA the narrow ability to write Secrets.
#
# Crucial omissions:
#   - NO `get` on secrets. Workers must not be able to read back values
#     via the K8s API. If a worker needs a value, it must consume it via
#     `envFrom` on its own pod spec. This is the single biggest
#     exfiltration-vector guard in RFC 0005.
#   - NO `delete` on secrets. Key/secret deletion is a separate workflow
#     with its own HITL gate (Sprint 2).
#   - NO `list` or `watch`. Nothing enumerates secrets via this SA.
#   - NO access to `serviceaccounts`, `pods`, `deployments`, anything else.
#
# The same Role is instantiated once per target namespace via a
# RoleBinding in selva-secret-writer-rolebinding.yaml. Adding a new
# namespace requires a manifest PR there AND an update to the
# ALLOWED_NAMESPACES constant in
# packages/tools/src/selva_tools/builtins/k8s_secret.py.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  # Role name is identical in every namespace where it's defined so
  # the RoleBinding template can reference it without branching.
  name: selva-secret-writer
  # namespace is template-substituted; each target namespace gets its
  # own Role instance (kustomize/overlays or manual apply).
  labels:
    app.kubernetes.io/part-of: autoswarm-office
    app.kubernetes.io/component: secret-writer
    rfc: "0005"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    # NO get, NO list, NO watch, NO delete — by design. See comment above.
    verbs: ["create", "update", "patch"]
