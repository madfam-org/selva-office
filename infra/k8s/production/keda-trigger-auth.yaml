# KEDA TriggerAuthentication for Redis streams trigger.
# References the Redis password from selva-keda-redis secret.
# Secret created manually on cluster (interim until Vault ESO):
#   kubectl create secret generic selva-keda-redis -n autoswarm \
#     --from-literal=password='<redis-password>'
---
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: redis-trigger-auth
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: workers
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: autoswarm
spec:
  secretTargetRef:
    - parameter: password
      name: selva-keda-redis
      key: password
