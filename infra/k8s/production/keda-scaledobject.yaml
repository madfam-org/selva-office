# KEDA ScaledObject for AutoSwarm workers.
# Requires KEDA v2.10+ installed in the cluster.
# See docs/KEDA_QUEUE_SCALING.md for details.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: workers-keda
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: workers
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: autoswarm
spec:
  scaleTargetRef:
    name: workers
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    - type: redis-streams
      metadata:
        address: redis.data.svc.cluster.local:6379
        databaseIndex: "8"
        stream: autoswarm:task-stream
        consumerGroup: autoswarm-workers
        # Target: 5 pending messages per replica.
        pendingEntriesCount: "5"
      authenticationRef:
        name: redis-trigger-auth
