# KEDA ScaledObject for AutoSwarm workers.
# Requires KEDA v2.10+ installed in the cluster.
# See docs/KEDA_QUEUE_SCALING.md for details.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: autoswarm-worker
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: autoswarm-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: autoswarm
spec:
  scaleTargetRef:
    name: autoswarm-worker
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
    - type: redis-streams
      metadata:
        # Redis connection (use TriggerAuthentication for production).
        address: redis.autoswarm.svc.cluster.local:6379
        stream: autoswarm:task-stream
        consumerGroup: autoswarm-workers
        # Target: 5 pending messages per replica.
        pendingEntriesCount: "5"
