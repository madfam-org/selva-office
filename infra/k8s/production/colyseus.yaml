apiVersion: apps/v1
kind: Deployment
metadata:
  name: colyseus
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: colyseus
    app.kubernetes.io/part-of: selva
    app.kubernetes.io/component: realtime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: colyseus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: colyseus
        app.kubernetes.io/part-of: selva
        app.kubernetes.io/component: realtime
    spec:
      serviceAccountName: selva-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: colyseus
          image: ghcr.io/madfam-org/selva-colyseus:latest
          ports:
            - containerPort: 4303
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4303
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4303
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: selva-config
          env:
            - name: ENVIRONMENT
              value: production
            - name: COLYSEUS_PORT
              value: "4303"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: selva-secrets
                  key: redis-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: selva-secrets
                  key: secret-key
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: colyseus
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: colyseus
    app.kubernetes.io/part-of: selva
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: colyseus
  ports:
    - port: 80
      targetPort: 4303
      protocol: TCP
