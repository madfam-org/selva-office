# ExternalSecret for autoswarm-admin SSO session signing
# Vault-ready: will be managed by ESO + ClusterSecretStore when Vault is deployed
# Interim: create K8s secret manually via kubectl until Vault goes live
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: autoswarm-admin-auth
  namespace: autoswarm
  labels:
    app.kubernetes.io/name: admin
    app.kubernetes.io/part-of: autoswarm-office
    app.kubernetes.io/managed-by: external-secrets
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: vault-store
    kind: ClusterSecretStore
  target:
    name: autoswarm-admin-auth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: JANUA_SECRET_KEY
      remoteRef:
        key: secret/autoswarm
        property: janua_secret_key
