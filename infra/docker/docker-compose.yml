version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: selva-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: autoswarm
      POSTGRES_PASSWORD: autoswarm
      POSTGRES_DB: autoswarm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoswarm -d autoswarm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - selva-shared-network

  coturn:
    image: coturn/coturn:latest
    container_name: selva-coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - selva-shared-network

  redis:
    image: redis:7-alpine
    container_name: selva-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - selva-shared-network

  nexus-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.nexus-api
    container_name: selva-nexus-api
    ports:
      - "4300:4300"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://selva:autoswarm@postgres:5432/autoswarm
      REDIS_URL: redis://redis:6379/0  # DB 0: nexus-api (task queue, rate limits, pub/sub)
      NEXUS_API_PORT: "4300"
      ENVIRONMENT: development
    networks:
      - selva-shared-network

  office-ui:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.office-ui
    container_name: selva-ui
    ports:
      - "4301:3000"
    depends_on:
      - nexus-api
    environment:
      NEXT_PUBLIC_API_URL: http://nexus-api:4300
      NEXT_PUBLIC_COLYSEUS_URL: ws://colyseus:4303
    networks:
      - selva-shared-network

  colyseus:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.colyseus
    container_name: selva-colyseus
    ports:
      - "4303:4303"
    environment:
      COLYSEUS_PORT: "4303"
      REDIS_URL: redis://redis:6379/1  # DB 1: colyseus (room state, proximity, signaling)
    networks:
      - selva-shared-network

  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.gateway
    container_name: selva-gateway
    ports:
      - "4304:4304"
    environment:
      NEXUS_API_URL: http://nexus-api:4300
      NEXUS_API_WS_URL: ws://nexus-api:4300/api/v1/approvals/ws
      GATEWAY_HEALTH_PORT: "4304"
      REDIS_URL: redis://redis:6379/0  # DB 0: shares with nexus-api
    depends_on:
      - nexus-api
      - redis
    networks:
      - selva-shared-network

  livekit:
    image: livekit/livekit-server:latest
    container_name: selva-livekit
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    command: ["--config", "/etc/livekit.yaml"]
    networks:
      - selva-shared-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  selva-shared-network:
    external: false
