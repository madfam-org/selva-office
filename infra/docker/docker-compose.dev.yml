version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: selva-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: autoswarm
      POSTGRES_PASSWORD: autoswarm
      POSTGRES_DB: autoswarm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoswarm -d autoswarm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - selva-shared-network

  redis:
    image: redis:7-alpine
    container_name: selva-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - selva-shared-network

  coturn:
    image: coturn/coturn:latest
    container_name: selva-coturn
    ports:
      - "3478:3478"
      - "3478:3478/udp"
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    networks:
      - selva-shared-network

  livekit:
    image: livekit/livekit-server:latest
    container_name: selva-livekit
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    command: ["--config", "/etc/livekit.yaml"]
    networks:
      - selva-shared-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  selva-shared-network:
    external: false
