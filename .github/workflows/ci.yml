name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-ts:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  lint-py:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check .

  typecheck-py:
    name: Typecheck Python
    runs-on: ubuntu-latest
    needs: lint-py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Mypy
        run: uv run mypy apps/nexus-api/ apps/workers/ packages/

  lint-community-skills:
    name: Lint Community Skills (advisory)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for community skill changes
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'packages/skills/community-skills/' || true)
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.changed.outputs.skip != 'true'
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.changed.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        if: steps.changed.outputs.skip != 'true'
        run: uv sync

      - name: Ruff check community skills (errors + pyflakes only)
        if: steps.changed.outputs.skip != 'true'
        run: uv run ruff check --select E,F packages/skills/community-skills/

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: lint-ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  test-ts:
    name: Test TypeScript
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

  test-py:
    name: Test Python
    runs-on: ubuntu-latest
    needs: lint-py
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: autoswarm
          POSTGRES_PASSWORD: autoswarm
          POSTGRES_DB: autoswarm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U autoswarm -d autoswarm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 30s
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: postgresql://autoswarm:autoswarm@localhost:5432/autoswarm
          REDIS_URL: redis://localhost:6379

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-ts, test-py, typecheck-py]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table
