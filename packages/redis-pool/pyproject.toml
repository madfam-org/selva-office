[project]
name = "autoswarm-redis-pool"
version = "0.1.0"
description = "Shared Redis connection pool with circuit breaker for AutoSwarm services"
requires-python = ">=3.12"
dependencies = [
  "redis>=5.2.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autoswarm_redis_pool"]
