[project]
name = "selva-redis-pool"
version = "0.1.0"
description = "Shared Redis connection pool with circuit breaker for Selva services"
requires-python = ">=3.12"
dependencies = [
  "redis>=5.2.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/selva_redis_pool"]
