[project]
name = "madfam-revenue-loop-probe"
version = "0.1.0"
description = "Synthetic end-to-end probe that exercises the MADFAM revenue flywheel: CRM -> draft -> email -> Stripe webhook -> Dhanam billing -> PhyneCRM attribution. Pages when any stage breaks."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Innovaciones MADFAM" }]

dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
    "ruff>=0.6",
]

[project.scripts]
revenue-loop-probe = "revenue_loop_probe.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/revenue_loop_probe"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
