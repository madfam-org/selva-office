[project]
name = "madfam-inference"
version = "0.1.0"
description = "Sensitivity-aware LLM inference routing with multi-provider support"
readme = "README.md"
license = { text = "AGPL-3.0-only" }
requires-python = ">=3.12"
authors = [{ name = "MADFAM", email = "engineering@selva.town" }]
keywords = ["llm", "inference", "routing", "multi-provider", "ai", "madfam"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = ["httpx>=0.28.1", "pydantic>=2.10.5"]

[project.optional-dependencies]
yaml = ["pyyaml>=6.0"]
anthropic = ["anthropic>=0.43.0"]
openai = ["openai>=1.59.0"]
crm = []
all = ["pyyaml>=6.0", "anthropic>=0.43.0", "openai>=1.59.0"]

[project.urls]
Repository = "https://github.com/madfam-org/selva"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["madfam_inference"]
