[project]
name = "autoswarm-observability"
version = "0.1.0"
description = "Shared logging and observability for AutoSwarm services"
requires-python = ">=3.12"
dependencies = [
  "structlog>=24.0",
]

[project.optional-dependencies]
sentry = ["sentry-sdk[fastapi]>=2.19.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autoswarm_observability"]
