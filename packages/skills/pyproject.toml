[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "autoswarm-skills"
version = "0.1.0"
description = "AutoSwarm Office skills registry for storing and retrieving procedurally generated tools and agent logics."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "MADFAM Org" }]
dependencies = [
    "pydantic>=2.0.0",
]

[tool.setuptools.packages.find]
# Package lives at root (autoswarm_skills/), NOT in src/.
# The src/autoswarm_skills/ directory contains legacy Wave 4 modules
# that have been merged into the root package — do not add where=["src"].
include = ["autoswarm_skills*"]
