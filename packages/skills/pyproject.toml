[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "autoswarm-skills"
version = "0.1.0"
description = "AutoSwarm Office skills registry for storing and retrieving procedurally generated tools and agent logics."
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "MADFAM Org" }]
dependencies = [
    "pydantic>=2.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["autoswarm_skills*"]
