[project]
name = "selva-sdk"
version = "0.1.0"
description = "Python SDK for Selva"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.27",
  "pydantic>=2.10",
  "click>=8.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
autoswarm = "selva_sdk.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["selva_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
