[project]
name = "selva-permissions"
version = "0.1.0"
description = "HITL permission system with action classification"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.10.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["selva_permissions"]
