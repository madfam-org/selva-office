[project]
name = "autoswarm-a2a"
version = "0.1.0"
description = "A2A protocol implementation for AutoSwarm agents"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.0.0",
  "fastapi>=0.100.0",
  "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["autoswarm_a2a"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
