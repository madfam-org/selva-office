[project]
name = "autoswarm-calendar"
version = "0.1.0"
description = "Calendar integration adapters for AutoSwarm Office"
requires-python = ">=3.12"
dependencies = ["httpx>=0.27", "pydantic>=2.10"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["autoswarm_calendar"]
