[project]
name = "selva-tools"
version = "0.1.0"
description = "Tool registry and built-in tools for Selva agent workflows"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.10.5",
  "httpx>=0.28.1",
]

[project.optional-dependencies]
mcp = ["jsonrpc-base>=2.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/selva_tools"]
