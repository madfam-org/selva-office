[project]
name = "autoswarm-doctor"
version = "0.1.0"
description = "Preflight check for Selva/AutoSwarm. Validates environment, binaries, provider reachability, and ops dependencies before work begins."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Innovaciones MADFAM" }]

dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.6",
]

[project.scripts]
autoswarm-doctor = "autoswarm_doctor.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/autoswarm_doctor"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
