# ═══════════════════════════════════════════════════════════════════════
# Selva Org Config Template
# ═══════════════════════════════════════════════════════════════════════
#
# Copy this file to ~/.selva/org-config.yaml and customise.
# API keys are referenced by env var name — never paste plaintext here.
#
# This file is committed as a reference; the ACTUAL config lives
# outside the repo at ~/.selva/org-config.yaml.
# ═══════════════════════════════════════════════════════════════════════

# ── Provider definitions ──────────────────────────────────────────────
# Each entry registers an OpenAI-compatible endpoint.
# api_key_env: the *name* of the environment variable holding the key.
providers:
  # example_provider:
  #   base_url: https://api.example.com/v1
  #   api_key_env: EXAMPLE_API_KEY
  #   vision: false
  #   timeout: 120.0

  # deepinfra, together, fireworks, anthropic, openai, openrouter, ollama,
  # groq, mistral are registered automatically from env vars — only add
  # them here if you need to override base_url or timeout.

# ── Task-type model assignments ───────────────────────────────────────
# When a graph node declares a task_type, the router uses this table
# to pick the provider and model.  Unmatched task types fall through
# to the default priority-list routing.
model_assignments:
  # planning:
  #   provider: ""      # e.g., "anthropic", "openai", "deepinfra"
  #   model: ""         # e.g., "claude-sonnet-4-20250514"
  #   max_tokens: 8192
  #   temperature: 0.6
  #
  # coding:
  #   provider: ""      # Provider for code generation tasks
  #   model: ""
  #   max_tokens: 8192
  #   temperature: 0.4
  #
  # fast_coding:
  #   provider: ""      # Provider for quick code edits
  #   model: ""
  #   max_tokens: 4096
  #   temperature: 0.3
  #
  # review:
  #   provider: ""      # Provider for code review
  #   model: ""
  #   max_tokens: 4096
  #   temperature: 0.5
  #
  # research:
  #   provider: ""      # Provider for research tasks
  #   model: ""
  #   max_tokens: 8192
  #   temperature: 0.7
  #
  # crm:
  #   provider: ""
  #   model: ""
  #   max_tokens: 4096
  #   temperature: 0.7
  #
  # support:
  #   provider: ""
  #   model: ""
  #   max_tokens: 2048
  #   temperature: 0.7
  #
  # vision:
  #   provider: ""
  #   model: ""
  #   max_tokens: 4096
  #   temperature: 0.5
  #
  # embedding:
  #   provider: ""
  #   model: ""
  #   max_tokens: 512
  #   temperature: 0.0

# ── Priority lists (optional overrides) ───────────────────────────────
# When no model_assignment matches, these lists control provider order.
# Omit to use the built-in defaults.
# cloud_priority:
#   - anthropic
#   - openai
#   - fireworks
#   - together
#   - deepinfra
#   - openrouter
#
# cheapest_priority:
#   - deepinfra
#   - together
#   - fireworks
#   - openrouter
#   - openai
#   - anthropic

# ── External service accounts ─────────────────────────────────────────
# Tracks subscriptions, capacity, and payment status for external
# services the org depends on.  Agents can query this to know what
# services are available and their limits.
services:
  # resend:
  #   provider: resend
  #   service_type: email
  #   api_key_env: RESEND_API_KEY
  #   plan: pro
  #   plan_details: "Transactional Pro $20/mo (50K emails, 10 domains). Marketing Free (1K contacts)."
  #   payment_method: credit_card
  #   capacity:
  #     emails_per_month: 50000
  #     domains: 10
  #     rate_limit_per_second: 10
  #   consumption_tracking: true
  #   status: active
  #   notes: ""

  # stripe:
  #   provider: stripe
  #   service_type: billing
  #   api_key_env: STRIPE_SECRET_KEY
  #   plan: standard
  #   payment_method: linked
  #   capacity:
  #     products: 100
  #   consumption_tracking: false
  #   status: active

# ── Org knowledge (injected into agent system prompts) ────────────────
# Facts agents should know when relevant skills are activated.
knowledge: []
  # - topic: email_infrastructure
  #   fact: "We use Resend for email. Transactional Pro ($20/mo, 50K/mo)."
  # - topic: billing_infrastructure
  #   fact: "Stripe for billing. Products and prices synced."

# ── Embedding config ──────────────────────────────────────────────────
embedding_provider: openai
embedding_model: text-embedding-3-small
